<!DOCTYPE html>
<html>
<head>
  <title>War Room</title>
</head>
<body>
  <h1>Dashboard</h1>
  <pre id="output"></pre>

  <script>
    async function fetchData() {
      const res = await fetch('/data');
      const data = await res.json();
      document.getElementById('output').innerText =
        JSON.stringify(data, null, 2);
    }

    setInterval(fetchData, 2000);
  </script>
</body>
</html>
